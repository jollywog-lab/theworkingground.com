function buildMatrix() {
  const m = {};
  COUNTRIES.forEach(c => {
    m[c.code] = {};
    THEMES.forEach(t => { m[c.code][t.code] = { maturity: 0, regs: [], hasNew: false }; });
  });
  REGS.forEach(r => {
    const cell = m[r.country]?.[r.theme];
    if (!cell) return;
    cell.regs.push(r);
    if (r.maturity > cell.maturity) cell.maturity = r.maturity;
    if (r.isNew) cell.hasNew = true;
  });
  return m;
}

function RegPopover({ country, theme, cell, onClose, anchorRect }) {
  const themeDef = THEMES.find(t => t.code === theme);
  const popW = 340;
  const popH = Math.min(300, 60 + cell.regs.length * 70);
  let top, left;
  if (anchorRect) {
    left = Math.max(8, Math.min(window.innerWidth - popW - 8, anchorRect.left + anchorRect.width / 2 - popW / 2));
    if (anchorRect.top > popH + 12) {
      top = anchorRect.top - popH - 8;
    } else {
      top = anchorRect.bottom + 8;
    }
  }
  return (
    <div className="popover-card" style={anchorRect ? {top, left} : {}} onClick={e => e.stopPropagation()}>
      <div className="px-3 py-2 border-b border-slate-100 flex items-center justify-between">
        <div>
          <span className="font-semibold text-[11px]">{country.name}</span>
          <span className="text-[10px] text-slate-400 ml-1.5">· {themeDef?.short}</span>
        </div>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-xs px-1">✕</button>
      </div>
      <div className="px-3 py-2">
        {cell.regs.length === 0 ? (
          <div className="text-[10px] text-slate-400 py-2">No regulations recorded.</div>
        ) : (
          cell.regs.map(r => (
            <div key={r.id} className="mb-2 last:mb-0">
              <div className="flex items-start gap-1.5">
                <span className={`mt-0.5 inline-block w-1.5 h-1.5 rounded-full flex-shrink-0 ${r.isNew ? 'bg-yellow-400' : 'bg-slate-300'}`}></span>
                <div className="flex-1 min-w-0">
                  <div className="text-[10.5px] font-medium leading-tight">{r.name}</div>
                  <div className="text-[9.5px] text-slate-500 mt-0.5">{r.obligation}</div>
                  <div className="text-[9px] text-slate-400 mt-0.5">
                    Eff: {r.effectiveDate === 'TBD' ? 'TBD' : r.effectiveDate === 'stayed' ? 'Stayed' : r.effectiveDate}
                    <span className="mx-1">·</span>
                    <span className={r.isNew ? 'text-emerald-600 font-medium' : ''}>
                      {r.isNew ? 'New / upcoming' : 'Pre-existing'}
                    </span>
                    <span className="mx-1">·</span>
                    Maturity: {MATURITY_SHORT[r.maturity]}
                  </div>
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function DotMatrix({ matrix, visibleCountries }) {
  const [activePopover, setActivePopover] = useState(null);
  const grid = {};
  THEMES.forEach(t => {
    grid[t.code] = {};
    for (let lvl = 0; lvl <= 5; lvl++) grid[t.code][lvl] = [];
    visibleCountries.forEach(c => {
      const lvl = matrix[c.code][t.code].maturity;
      grid[t.code][lvl].push(c);
    });
  });
  const levels = [5,4,3,2,1,0];
  const dotSize = 21;
  function togglePopover(countryCode, themeCode, e) {
    if (activePopover && activePopover.country === countryCode && activePopover.theme === themeCode) {
      setActivePopover(null);
    } else {
      const rect = e.currentTarget.getBoundingClientRect();
      setActivePopover({ country: countryCode, theme: themeCode, rect });
    }
  }
  function handleTableClick(e) {
    if (!e.target.closest('.popover-card') && !e.target.closest('.dot')) {
      setActivePopover(null);
    }
  }
  return (
    <div className="overflow-auto" onClick={handleTableClick}>
      <table className="w-full" style={{borderCollapse:'separate', borderSpacing:'0'}}>
        <thead>
          <tr>
            <th className="w-20 pr-2 text-right text-[10px] text-slate-400 font-normal align-bottom pb-1">Maturity</th>
            {THEMES.map((t, i) => (
              <th key={t.code} className="text-center pb-1 px-0.5" style={{borderLeft: i > 0 ? '1px solid #e2e8f0' : 'none'}}>
                <div className="text-[9px] font-semibold leading-tight text-slate-700 whitespace-pre-line">{t.name}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {levels.map(lvl => (
            <tr key={lvl} className="border-b border-slate-100">
              <td className="pr-2 text-right align-middle py-0.5">
                <div className="text-[9px] text-slate-500 leading-tight">{MATURITY_SHORT[lvl]}</div>
              </td>
              {THEMES.map((t, i) => {
                const dots = grid[t.code][lvl];
                return (
                  <td key={t.code} className="align-middle px-0.5 py-0.5" style={{borderLeft: i > 0 ? '1px solid #f1f5f9' : 'none'}}>
                    <div className="flex flex-wrap justify-center gap-0.5 min-h-[24px]">
                      {dots.map(c => {
                        const cell = matrix[c.code][t.code];
                        const isIntl = !c.groups.includes('ap') && !c.groups.includes('lasalle-ap');
                        const isActive = activePopover && activePopover.country === c.code && activePopover.theme === t.code;
                        return (
                          <div key={c.code} className="tooltip-wrap" style={{position:'relative'}}>
                            <div className="dot rounded-full flex items-center justify-center text-white font-bold cursor-pointer"
                              onClick={(e) => { e.stopPropagation(); togglePopover(c.code, t.code, e); }}
                              style={{
                                width: dotSize, height: dotSize, fontSize: 7.5,
                                backgroundColor: c.colour,
                                border: isActive ? '2px solid #0f172a' : cell.hasNew ? '2px solid #facc15' : isIntl ? '2px dashed #94a3b8' : 'none',
                                opacity: isActive ? 1 : undefined,
                              }}>
                              {c.code}
                            </div>
                            {!isActive && (
                              <div className="tip">
                                {c.name} · {MATURITY_LABELS[lvl]}
                                {cell.hasNew && ' · NEW/UPCOMING'}
                                {cell.regs.length > 0 && ` · Click for ${cell.regs.length} reg${cell.regs.length > 1 ? 's' : ''}`}
                              </div>
                            )}
                            {isActive && (
                              <RegPopover
                                country={c}
                                theme={t.code}
                                cell={cell}
                                onClose={() => setActivePopover(null)}
                                anchorRect={activePopover.rect}
                              />
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}
function NewUpcoming({ visibleCountries }) {
  const codes = new Set(visibleCountries.map(c => c.code));
  const items = REGS.filter(r => r.isNew && codes.has(r.country))
    .sort((a,b) => {
      const da = a.effectiveDate === 'stayed' || a.effectiveDate === 'TBD' ? '9999' : a.effectiveDate;
      const db = b.effectiveDate === 'stayed' || b.effectiveDate === 'TBD' ? '9999' : b.effectiveDate;
      return da.localeCompare(db);
    });
  return (
    <table className="w-full text-[10.5px]">
      <thead>
        <tr className="border-b-2 border-slate-300">
          <th className="text-left py-0.5 pr-1.5 w-14">Market</th>
          <th className="text-left py-0.5 pr-1.5">Instrument</th>
          <th className="text-left py-0.5 pr-1.5 w-[46%]">Key obligation</th>
          <th className="text-right py-0.5 w-16">Effective</th>
        </tr>
      </thead>
      <tbody>
        {items.map(r => {
          const c = COUNTRIES.find(x => x.code === r.country);
          const t = THEMES.find(x => x.code === r.theme);
          return (
            <tr key={r.id} className="border-b border-slate-100">
              <td className="py-0.5 pr-1.5 font-medium" style={{color: c?.colour}}>{c?.name}</td>
              <td className="py-0.5 pr-1.5">
                <span className="inline-block w-1.5 h-1.5 rounded-full mr-1 align-middle" style={{backgroundColor: t?.colour}}></span>
                {r.name}
              </td>
              <td className="py-0.5 pr-1.5 text-slate-600">{r.obligation}</td>
              <td className="py-0.5 text-right font-mono text-[9.5px]">{r.effectiveDate === 'TBD' ? 'TBD' : r.effectiveDate === 'stayed' ? 'Stayed' : r.effectiveDate.slice(0,7)}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

function Footnotes() {
  return (
    <div className="print-break" style={{pageBreakBefore: 'always'}}>
      <div className="bg-white shadow-lg rounded border border-slate-200 w-full max-w-[1280px] mx-auto mt-4 p-6">
        <h2 className="text-sm font-semibold mb-4 text-slate-900">Appendix — Definitions & Notes</h2>
        <h3 className="text-[11px] font-semibold text-slate-700 uppercase tracking-wide mb-2">Theme definitions</h3>
        <table className="w-full text-[10.5px] mb-5">
          <thead>
            <tr className="border-b-2 border-slate-300">
              <th className="text-left py-1 pr-3 w-36">Theme</th>
              <th className="text-left py-1 pr-3">Scope</th>
              <th className="text-left py-1 w-[40%]">Real estate examples</th>
            </tr>
          </thead>
          <tbody className="text-slate-700">
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Reporting & Disclosure</td><td className="py-1.5 pr-3">Mandatory and voluntary sustainability reporting frameworks, climate-related financial disclosure, ESG governance requirements (board oversight, assurance, data integrity). Governance is included here because regulatory treatment of ESG governance is primarily through disclosure obligations (TCFD governance pillar, ISSB S2 governance requirements, board-level accountability provisions).</td><td className="py-1.5">ISSB S1/S2 local adoption, CSRD/ESRS, SGX 711A/B, HKEX climate rules, TCFD-aligned mandates.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Transition Risk</td><td className="py-1.5 pr-3">Financial risk from the policy and market shift to a low-carbon economy. Regulations that require entities to plan for, quantify, or manage the risk that assets lose value as decarbonisation standards tighten — stranded asset exposure, carbon pricing, CRREM pathway exceedance, lender/insurer repricing, transition plan mandates.</td><td className="py-1.5">MAS Transition Planning Guidelines, CRREM pathways, IIGCC PCRAM, green/transition taxonomy requirements.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Physical Climate Risk</td><td className="py-1.5 pr-3">Financial risk from physical climate impacts on the asset. Regulations addressing flood, heat, cyclone, bushfire, sea-level rise, and other climate hazards through building code resilience uplifts, mandatory physical risk disclosure, or planning restrictions.</td><td className="py-1.5">Building code resilience uplifts (wind, flood, heat), mandatory physical risk assessment, planning overlays for climate hazards, insurability requirements.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Green Buildings</td><td className="py-1.5 pr-3">Whole-building sustainability rating schemes and design standards that assess multiple environmental criteria (energy, water, materials, indoor environment) as an integrated package. Typically certification-based, either voluntary or mandated at a minimum tier for new construction.</td><td className="py-1.5">Green Mark, Green Star, BEAM Plus, BREEAM, CASBEE, G-SEED, GBI, IGBC/GRIHA, TREES, Greenship, LEED.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Energy & Operational Carbon</td><td className="py-1.5 pr-3">Regulations targeting the energy consumed and carbon emitted during building operation. Mandatory energy performance codes, minimum efficiency standards for existing buildings (MEES, MEI), operational energy intensity labelling (NABERS, BELS), building performance standards with emissions caps, and energy audit mandates.</td><td className="py-1.5">NABERS, NCC Section J, MEES, Décret Tertiaire, NYC LL97, BCA MEI, ECBC, Building Energy Codes.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Embodied Carbon</td><td className="py-1.5 pr-3">Regulations targeting the carbon embedded in construction materials and the building lifecycle (cradle-to-grave). Whole-life carbon assessments, material-level carbon benchmarks, Environmental Product Declaration (EPD) requirements, low-carbon procurement mandates.</td><td className="py-1.5">RE2020 (France), London Plan WLC, Singapore concrete carbon benchmark, EPD mandates.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Waste & Circularity</td><td className="py-1.5 pr-3">Construction and demolition waste regulation, material reuse and recycling mandates, extended producer responsibility schemes, single-use product restrictions affecting retail and commercial tenancies, circular economy requirements.</td><td className="py-1.5">Korea waste policy, Singapore Beverage Container Return Scheme, C&D waste diversion mandates.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Nature & Biodiversity</td><td className="py-1.5 pr-3">Regulations addressing nature loss, biodiversity, urban greening, water efficiency, and ecosystem restoration as they apply to the built environment. TNFD-aligned disclosure, biodiversity net gain requirements, urban greening ratios, water recycling mandates.</td><td className="py-1.5">EU Nature Restoration Regulation, UK Biodiversity Net Gain, urban greening ratio requirements.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1.5 pr-3 font-medium">Social Impact</td><td className="py-1.5 pr-3">Regulations addressing social outcomes in construction and real estate operation: modern slavery and forced labour in supply chains, construction worker safety, community impact, affordable housing linkages, DEI disclosure where it applies to real estate employers or operators.</td><td className="py-1.5">UK Modern Slavery Act, US UFLPA (solar panel/materials supply chain), construction safety mandates.</td></tr>
          </tbody>
        </table>
        <h3 className="text-[11px] font-semibold text-slate-700 uppercase tracking-wide mb-2">Maturity ladder</h3>
        <table className="w-full text-[10.5px] mb-5">
          <thead>
            <tr className="border-b-2 border-slate-300">
              <th className="text-left py-1 w-10">Level</th>
              <th className="text-left py-1 pr-3 w-32">Label</th>
              <th className="text-left py-1">Observable test</th>
            </tr>
          </thead>
          <tbody className="text-slate-700">
            {MATURITY_LABELS.map((label, i) => (
              <tr key={i} className="border-b border-slate-100">
                <td className="py-1">{i}</td>
                <td className="py-1 pr-3 font-medium">{label}</td>
                <td className="py-1">{['No regulation, standard, or rating scheme recorded for this country x theme.','An instrument exists (consultation paper, draft regulation, or standard under development) but has not been finalised or brought into force.','A voluntary rating, standard, or incentive scheme is in force but there is no mandatory requirement.','A mandatory requirement exists but scope is limited — by building size threshold, entity type, geography, or asset class.','A mandatory requirement captures the majority of the relevant building stock or entity base in that jurisdiction.','A mandatory requirement is in force with active enforcement mechanisms: financial penalties, compliance audits, mandatory assurance, or licence/consent conditions.'][i]}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <h3 className="text-[11px] font-semibold text-slate-700 uppercase tracking-wide mb-2">Market inclusion rationale</h3>
        <table className="w-full text-[10.5px] mb-3">
          <thead>
            <tr className="border-b-2 border-slate-300">
              <th className="text-left py-1 pr-3 w-28">Market</th>
              <th className="text-left py-1 pr-3 w-24">Group</th>
              <th className="text-left py-1">Rationale</th>
            </tr>
          </thead>
          <tbody className="text-slate-700">
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Japan</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Korea</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Australia</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Singapore</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market. Regional HQ.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">China</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Hong Kong</td><td className="py-1 pr-3">LaSalle AP</td><td className="py-1">Core LaSalle AP market.</td></tr>
            <tr className="border-b border-slate-200"><td className="py-1 pr-3 font-medium">UK</td><td className="py-1 pr-3">LaSalle Global</td><td className="py-1">International comparator. Leading on MEES, TCFD-mandated disclosure, Biodiversity Net Gain.</td></tr>
            <tr className="border-b border-slate-200"><td className="py-1 pr-3 font-medium">France / EU</td><td className="py-1 pr-3">LaSalle Global</td><td className="py-1">International comparator. EU leads on whole-life carbon (RE2020), mandatory energy reduction pathways (Décret Tertiaire), and disclosure scope (CSRD).</td></tr>
            <tr className="border-b border-slate-200"><td className="py-1 pr-3 font-medium">US</td><td className="py-1 pr-3">LaSalle Global</td><td className="py-1">International comparator. Federal policy stalled (SEC rule stayed), but city-level building performance standards (NYC LL97, WA CBPS) are globally significant.</td></tr>
            <tr className="border-b border-slate-200"><td className="py-1 pr-3 font-medium">Canada</td><td className="py-1 pr-3">LaSalle Global</td><td className="py-1">International comparator. Provincial energy step codes (BC) and federal green buildings strategy. CSSB adopting ISSB.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Malaysia</td><td className="py-1 pr-3">AP (non-LaSalle)</td><td className="py-1">ASEAN market with growing RE investment. Bursa Malaysia ISSB-aligned reporting now mandatory.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Indonesia</td><td className="py-1 pr-3">AP (non-LaSalle)</td><td className="py-1">Largest ASEAN economy. OJK sustainable finance roadmap, Greenship.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">India</td><td className="py-1 pr-3">AP (non-LaSalle)</td><td className="py-1">Major and growing RE investment market. SEBI BRSR mandatory for top 1,000 listed. BRSR Core with assurance from FY2024.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">New Zealand</td><td className="py-1 pr-3">AP (non-LaSalle)</td><td className="py-1">World-first mandatory climate-related disclosure (FMC Act, effective 2024). NABERSNZ aligned with Australia.</td></tr>
            <tr className="border-b border-slate-100"><td className="py-1 pr-3 font-medium">Thailand</td><td className="py-1 pr-3">AP (non-LaSalle)</td><td className="py-1">Established ASEAN commercial RE market. TREES rating system, mandatory building energy code. SEC One Report mandatory.</td></tr>
          </tbody>
        </table>
        <div className="text-[8px] text-slate-400 mt-3">LaSalle Investment Management · Appendix to Executive Summary · {PERIOD}</div>
      </div>
    </div>
  );
}

function App() {
  const matrix = useMemo(() => buildMatrix(), []);
  const [sortPreset, setSortPreset] = useState('lasalle-ap');
  const [showNotes, setShowNotes] = useState(false);
  const visibleCountries = sortPreset === 'all' ? COUNTRIES : COUNTRIES.filter(c => c.groups.includes(sortPreset));
  const newCount = REGS.filter(r => r.isNew && visibleCountries.some(c => c.code === r.country)).length;
  return (
    <div className="min-h-screen flex flex-col items-center py-4 px-2">
      <div className="page bg-white shadow-lg rounded border border-slate-200 w-full max-w-[1280px]">
        <div className="px-5 pt-4 pb-2 border-b border-slate-200">
          <div className="flex items-start justify-between">
            <div>
              <h1 className="text-sm font-semibold text-slate-900">APAC Sustainability Regulatory Tracker — Executive Summary</h1>
              <p className="text-[10px] text-slate-500 mt-0.5">Real estate, building & construction · {PERIOD} · {REGS.length} regulations, {COUNTRIES.length} jurisdictions</p>
            </div>
            <div className="flex items-center gap-2 no-print">
              <div className="flex border rounded overflow-hidden text-[10px]">
                {SORT_PRESETS.map(p => (
                  <button key={p.key} onClick={() => setSortPreset(p.key)} title={p.desc}
                    className={`px-2.5 py-1 border-r last:border-r-0 ${sortPreset === p.key ? 'bg-emerald-600 text-white font-medium' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>
                    {p.label}
                  </button>
                ))}
              </div>
              <button onClick={() => window.print()} className="bg-slate-700 text-white px-2.5 py-1 rounded text-[10px] hover:bg-slate-800">Print</button>
            </div>
          </div>
        </div>
        <div className="px-5 pt-3 pb-1.5">
          <div className="flex items-center justify-between mb-1.5">
            <h2 className="text-[10px] font-semibold text-slate-700 uppercase tracking-wide">Regulatory maturity by theme</h2>
            <div className="flex items-center gap-3 text-[9px] text-slate-500">
              <span className="flex items-center gap-1"><span className="inline-block w-3.5 h-3.5 rounded-full border-2 border-yellow-400 bg-slate-300"></span>New / upcoming</span>
              <span className="flex items-center gap-1"><span className="inline-block w-3.5 h-3.5 rounded-full border-2 border-dashed border-slate-400 bg-slate-300"></span>International</span>
              <span className="flex items-center gap-1"><span className="inline-block w-3.5 h-3.5 rounded-full bg-slate-300"></span>APAC (current)</span>
            </div>
          </div>
          <DotMatrix matrix={matrix} visibleCountries={visibleCountries} />
        </div>
        <div className="px-5 pb-1">
          <div className="flex flex-wrap gap-x-2.5 gap-y-0 text-[9px]">
            {visibleCountries.map(c => (
              <span key={c.code} className="flex items-center gap-0.5">
                <span className="inline-block w-2 h-2 rounded-full" style={{backgroundColor: c.colour}}></span>
                <span className="text-slate-500">{c.code} {c.name}</span>
              </span>
            ))}
          </div>
        </div>
        <div className="mx-5 border-t border-slate-300 my-1.5"></div>
        <div className="px-5 pb-3">
          <h2 className="text-[10px] font-semibold text-slate-700 uppercase tracking-wide mb-1">New & upcoming ({newCount})</h2>
          <NewUpcoming visibleCountries={visibleCountries} />
        </div>
        <div className="px-5 py-1.5 bg-slate-50 border-t border-slate-200 rounded-b">
          <div className="flex items-center justify-between text-[8px] text-slate-400">
            <span>LaSalle Investment Management · Head of Sustainability APAC · Illustrative data — verify before citing</span>
            <div className="flex items-center gap-3">
              <button onClick={() => setShowNotes(!showNotes)} className="text-emerald-600 hover:text-emerald-800 underline no-print">
                {showNotes ? 'Hide' : 'Show'} definitions & notes
              </button>
              <span>{new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'})}</span>
            </div>
          </div>
        </div>
      </div>
      {showNotes && <Footnotes />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
